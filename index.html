  @keyframes fadeDown {

  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }

  /* FORM */
  .container {
    position: relative;
    z-index: 10;

  .card {

  .divider { height: 1px; background: linear-gradient(90deg, transparent, #2a4a2a, transparent); margin: 18px 0; }

  .free-result-note {

  .btn-pay {

    border-radius: 12px;

  .btn-wa {

  /* FOOTER */

<!-- RESULT -->

<footer>
  <p>Made with ❤️ by <a href="https://digitechcyber.github.io" target="_blank">DigiTech-io</a> | Sitamarhi, Bihar</p>

</footer>

<script>
const WA_NUMBER = "918210073056";
const RAZORPAY_LINK = "https://rzp.io/rzp/eQD8sBQ";

async function generatePlan() {
  const fields = { name: 'name', age: 'age', weight: 'weight', height: 'height', gender: 'gender', diet: 'diet', goal: 'goal', time: 'time' };
  const vals = {};
  for (const [k, id] of Object.entries(fields)) {
    vals[k] = document.getElementById(id).value.trim();
    if (!vals[k]) { alert('Kripya sabhi details bharo!'); return; }
  }

  document.getElementById('btn-text').style.display = 'none';
  document.getElementById('spinner').style.display = 'block';
  document.getElementById('result-section').style.display = 'none';

  const bmi = (vals.weight / ((vals.height / 100) ** 2)).toFixed(1);

  const prompt = `You are a top fitness and nutrition expert in India. User details:
Name: ${vals.name}, Age: ${vals.age}, Weight: ${vals.weight}kg, Height: ${vals.height}cm, BMI: ${bmi}
Gender: ${vals.gender}, Diet: ${vals.diet}, Goal: ${vals.goal}, Exercise time: ${vals.time}

Create a HIGHLY PERSONALIZED fitness plan. Return ONLY valid JSON, no markdown, no explanation, no backticks.

{
  "greeting_hi": "Warm Hindi greeting with name",
  "greeting_en": "Warm English greeting with name",
  "bmi_status": "Underweight/Normal/Overweight/Obese",
  "bmi_color": "green/orange/red",
  "bmi_hi": "Short Hindi BMI message",
  "bmi_en": "Short English BMI message",
  "daily_cal": "number only e.g. 1800",
  "diet_plan": [
    {"time":"meal time Hindi/English","food_hi":"Hindi food","food_en":"English food","cal":"kcal"}
  ],
  "workout": [
    {"day":"Day name","ex_hi":"Hindi exercise","ex_en":"English exercise","sets":"sets x reps or duration","focus":"body part"}
  ],
  "tips_hi": ["tip1","tip2","tip3"],
  "tips_en": ["tip1","tip2","tip3"]
}

diet_plan = 6 meals. workout = 5 days. Everything SPECIFIC to their goal (${vals.goal}), diet (${vals.diet}), time (${vals.time}).`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });
    const data = await res.json();
    const raw = data.content.map(i => i.text || "").join("").replace(/```json|```/g, "").trim();
    const plan = JSON.parse(raw);
    renderPlan(plan, { ...vals, bmi });
  } catch (e) {
    document.getElementById('result-content').innerHTML = `<div class="card" style="color:#ff5252;text-align:center;padding:30px;">Kuch gadbad hui. Dobara try karo!<br><small>${e.message}</small></div>`;
    document.getElementById('result-section').style.display = 'block';
  } finally {
    document.getElementById('btn-text').style.display = 'block';
    document.getElementById('spinner').style.display = 'none';
  }
}

function renderPlan(p, info) {
  const bmiColor = p.bmi_color === 'green' ? '#00e676' : p.bmi_color === 'orange' ? '#ff9800' : '#ff5252';
  const waMsg = encodeURIComponent(`Namaste! Maine FitPlan AI try kiya. Mujhe ₹99 wala detailed plan chahiye!\n\nNaam: ${info.name}\nGoal: ${info.goal}\nWeight: ${info.weight}kg`);

  const dietRows = p.diet_plan.map(m => `<tr><td><b>${m.time}</b></td><td>${m.food_hi}<br><small style="color:#5a8a5a">${m.food_en}</small></td><td><span class="badge bg">${m.cal}</span></td></tr>`).join('');
  const workoutRows = p.workout.map(w => `<tr><td><b>${w.day}</b></td><td>${w.ex_hi}<br><small style="color:#5a8a5a">${w.ex_en}</small></td><td>${w.sets}</td><td><span class="badge by">${w.focus}</span></td></tr>`).join('');
  const tips = p.tips_hi.map((t, i) => `<div class="tip-box"><b>💡 Tip ${i+1}:</b> ${t}<br><small style="color:#4a7a4a">${p.tips_en[i]}</small></div>`).join('');

  document.getElementById('result-content').innerHTML = `
    <div class="result-header">
      <h2>🎉 ${p.greeting_hi}</h2>
      <p>${p.greeting_en}</p>
    </div>
    <div class="result-body">
      <div class="stats-row">
        <div class="stat-box"><div class="val" style="color:${bmiColor}">${info.bmi}</div><div class="lbl">BMI – ${p.bmi_status}</div></div>
        <div class="stat-box"><div class="val" style="color:#ffcc02">${p.daily_cal}</div><div class="lbl">Daily Calories</div></div>
        <div class="stat-box"><div class="val" style="color:#00e676;font-size:1.1rem">${info.goal}</div><div class="lbl">Aapka Goal</div></div>
      </div>
      <div class="bmi-note">
        <span style="color:#7cb87c">${p.bmi_hi}</span><br>
        <small style="color:#4a7a4a">${p.bmi_en}</small>
      </div>
      <div class="plan-block">
        <h3>🥗 Diet Plan / Aahaar Yojana</h3>
        <div style="overflow-x:auto"><table>
          <tr><th>Samay</th><th>Khana / Food</th><th>Cal</th></tr>
          ${dietRows}
        </table></div>
      </div>
      <div class="divider"></div>
      <div class="plan-block">
        <h3>🏋️ Workout Plan / Vyayam Yojana</h3>
        <div style="overflow-x:auto"><table>
          <tr><th>Din</th><th>Exercise</th><th>Sets</th><th>Focus</th></tr>
          ${workoutRows}
        </table></div>
      </div>
      <div class="divider"></div>
      <div class="plan-block">
        <h3>💡 Personal Tips / Salaah</h3>
        ${tips}
      </div>
      <div class="free-result-note">
        <strong>✅ Yeh tha aapka FREE Basic Plan!</strong>
        <p>Kya aap chahte ho 30 din ka complete detailed plan, shopping list, progress tracker aur WhatsApp support?</p>
      </div>
      <div class="upgrade-box">
        <h3>🔥 Sirf ₹99 mein Paao Complete Plan!</h3>
        <p>✅ 30-din ka detailed plan &nbsp;✅ Grocery shopping list<br>✅ Progress tracker &nbsp;✅ Weekly update<br>✅ WhatsApp pe direct support</p>
